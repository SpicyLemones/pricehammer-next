name: Nightly price refresh

on:
  schedule:
    # 17:10 UTC = 3:10am AEST — quiet hours for the retailers we poll
    - cron: "10 17 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Refresh prices (all sellers)
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -m 4800 \
            -u "${{ secrets.PRICEHAMMER_ADMIN_USER }}:${{ secrets.PRICEHAMMER_ADMIN_PASS }}" \
            -X POST "https://www.spycy.fun/api/refresh-prices")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || { echo "refresh failed"; exit 1; }
