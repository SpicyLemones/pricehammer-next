name: Weekly GW sync and price refresh

on:
  schedule:
    # 16:30 UTC Sunday = 2:30am AEST Monday — picks up the week's GW releases
    - cron: "30 16 * * 0"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Check credentials are configured
        run: |
          if [ -z "${{ secrets.PRICEHAMMER_ADMIN_USER }}" ] || [ -z "${{ secrets.PRICEHAMMER_ADMIN_PASS }}" ]; then
            echo "::error::Repo secrets PRICEHAMMER_ADMIN_USER and PRICEHAMMER_ADMIN_PASS are not set. Add them under Settings -> Secrets and variables -> Actions -> New repository secret, using the same values as ADMIN_USER / ADMIN_PASS on Render. Every step in this workflow will fail with 'unauthorized' until they exist."
            exit 1
          fi
          echo "credentials present"

      - name: Sync GW catalogue (add new releases)
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -m 1800 \
            -u "${{ secrets.PRICEHAMMER_ADMIN_USER }}:${{ secrets.PRICEHAMMER_ADMIN_PASS }}" \
            -X POST "https://www.spycy.fun/api/admin/sync-gw-catalogue?apply=1")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || { echo "sync failed"; exit 1; }

      - name: Auto-validate new pairs across sellers
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -m 3600 \
            -u "${{ secrets.PRICEHAMMER_ADMIN_USER }}:${{ secrets.PRICEHAMMER_ADMIN_PASS }}" \
            -X POST "https://www.spycy.fun/api/auto-validate")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || { echo "auto-validate failed"; exit 1; }

      - name: Refresh prices (all sellers)
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -m 4800 \
            -u "${{ secrets.PRICEHAMMER_ADMIN_USER }}:${{ secrets.PRICEHAMMER_ADMIN_PASS }}" \
            -X POST "https://www.spycy.fun/api/refresh-prices")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || { echo "refresh failed"; exit 1; }
