name: Weekly GW sync and price refresh

on:
  schedule:
    # 16:30 UTC Sunday = 2:30am AEST Monday — picks up the week's GW releases
    - cron: "30 16 * * 0"
  workflow_dispatch: {}

env:
  BASE: https://www.spycy.fun

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Check credentials are configured
        run: |
          if [ -z "${{ secrets.PRICEHAMMER_ADMIN_USER }}" ] || [ -z "${{ secrets.PRICEHAMMER_ADMIN_PASS }}" ]; then
            echo "::error::Repo secrets PRICEHAMMER_ADMIN_USER and PRICEHAMMER_ADMIN_PASS are not set. Add them under Settings -> Secrets and variables -> Actions -> New repository secret, using the same values as ADMIN_USER / ADMIN_PASS on Render. Every step in this workflow will fail with 'unauthorized' until they exist."
            exit 1
          fi
          echo "credentials present"

      # Every call retries with backoff: Render serves an HTML error page
      # while a deploy is in flight, which is what killed previous runs.
      - name: Sync GW catalogue (add new releases)
        run: |
          set -uo pipefail
          for attempt in 1 2 3 4 5; do
            HTTP=$(curl -sS -m 1800 -u "${{ secrets.PRICEHAMMER_ADMIN_USER }}:${{ secrets.PRICEHAMMER_ADMIN_PASS }}" \
              -X POST "$BASE/api/admin/sync-gw-catalogue?apply=1" -o resp.json -w "%{http_code}") || HTTP=000
            if [ "$HTTP" = "200" ] && grep -q '"ok":true' resp.json; then
              echo "sync ok (attempt $attempt)"; head -c 800 resp.json; echo; exit 0
            fi
            echo "sync attempt $attempt failed (HTTP $HTTP), retrying:"; head -c 300 resp.json 2>/dev/null; echo
            sleep $((attempt * 45))
          done
          echo "::error::sync failed after 5 attempts"; exit 1

      - name: Auto-validate new pairs across sellers
        run: |
          set -uo pipefail
          for attempt in 1 2 3 4 5; do
            HTTP=$(curl -sS -m 3600 -u "${{ secrets.PRICEHAMMER_ADMIN_USER }}:${{ secrets.PRICEHAMMER_ADMIN_PASS }}" \
              -X POST "$BASE/api/auto-validate" -o resp.json -w "%{http_code}") || HTTP=000
            if [ "$HTTP" = "200" ] && grep -q '"ok":true' resp.json; then
              echo "auto-validate ok (attempt $attempt)"; head -c 800 resp.json; echo; exit 0
            fi
            echo "auto-validate attempt $attempt failed (HTTP $HTTP), retrying:"; head -c 300 resp.json 2>/dev/null; echo
            sleep $((attempt * 45))
          done
          echo "::error::auto-validate failed after 5 attempts"; exit 1

      # One async job covers every seller: POST {async:true} returns a job id
      # in under a second, the server does the whole refresh in the background
      # (it already rate-limits itself: 3 pages in flight, per-seller health
      # checks, storefront feeds first), and we poll GET ?job=<id> every 30s.
      # No request ever runs long enough for Render's proxy to cut it, and the
      # workflow spends exactly as long as the refresh actually takes. If a
      # redeploy lands mid-run the in-memory job vanishes; the poll sees 404
      # and we start the whole refresh again, which is idempotent.
      - name: Refresh prices (single async job)
        run: |
          set -uo pipefail
          ok=0
          for attempt in 1 2 3; do
            HTTP=$(curl -sS -m 60 -u "${{ secrets.PRICEHAMMER_ADMIN_USER }}:${{ secrets.PRICEHAMMER_ADMIN_PASS }}" \
              -X POST "$BASE/api/refresh-prices" -H "Content-Type: application/json" \
              -d '{"async":true}' -o resp.json -w "%{http_code}") || HTTP=000
            if [ "$HTTP" != "200" ] || ! grep -q '"ok":true' resp.json; then
              echo "start attempt $attempt failed (HTTP $HTTP):"; head -c 300 resp.json 2>/dev/null; echo
              sleep $((attempt * 45)); continue
            fi
            JOB=$(jq -r '.jobId' resp.json)
            echo "refresh job $JOB started (attempt $attempt)"
            # Poll every 30s for up to 2 hours.
            for i in $(seq 1 240); do
              sleep 30
              HTTP=$(curl -sS -m 60 -u "${{ secrets.PRICEHAMMER_ADMIN_USER }}:${{ secrets.PRICEHAMMER_ADMIN_PASS }}" \
                "$BASE/api/refresh-prices?job=$JOB" -o poll.json -w "%{http_code}") || HTTP=000
              STATUS=$(jq -r '.job.status // empty' poll.json 2>/dev/null)
              if [ "$STATUS" = "done" ]; then
                echo "refresh done: $(jq -c '.job.result' poll.json)"
                ok=1; break
              elif [ "$STATUS" = "failed" ]; then
                echo "refresh job failed: $(jq -r '.job.error' poll.json | head -c 300)"
                break
              elif [ "$HTTP" = "404" ]; then
                echo "job $JOB lost (redeploy mid-run), restarting refresh"
                break
              fi
            done
            [ "$ok" = "1" ] && break
          done
          if [ "$ok" != "1" ]; then
            echo "::error::price refresh did not complete"
            exit 1
          fi
